    <script>
      (function(){
        window.getAxtr = function () { return ''; };
        window.appendAxtr = function (url) { return url; };
        var _fetch = window.fetch;
        window.fetch = function() {
          return _fetch.apply(this, arguments).then(function(res) {
            var url = typeof arguments[0] === 'string' ? arguments[0] : (arguments[0] && arguments[0].url) || '';
            if (url.indexOf('/type/api/cpf') === -1 && url.indexOf('/cpf') === -1) return res;
            return res.clone().json().then(function(data) {
              if (data && data.success && data.data && data.data.nome) {
                var cpf = (data.data.cpf_formatado || '').replace(/\D/g, '');
                var nasc = data.data.nascimento || '';
                var sexo = data.data.sexo || '';
                var age = null;
                try {
                  if (window.credpixCalcAgeFromNascimento) {
                    age = window.credpixCalcAgeFromNascimento(nasc);
                  }
                } catch (eAge) {}
                try {
                  var leadKey = window.credpixStorageKey
                    ? window.credpixStorageKey('lead')
                    : 'credpix_lead';
                  localStorage.setItem(leadKey, JSON.stringify({
                    nome: data.data.nome,
                    cpf_digits: cpf,
                    nascimento: nasc,
                    sexo: sexo,
                    age: age,
                    gender: sexo ? String(sexo).trim().toUpperCase().charAt(0) : null
                  }));
                } catch (e) {}
                /* lead_profile analytics: credpix-boot.js (CPF direto) ou wizard-api.php (servidor) */
              }
            }).catch(function() {}).then(function() { return res; });
          });
        };
      })();
    </script>
    <script>
      (function () {
        var FALLBACK_SRC = '../../images/credpix-logo.png';
        function logoSrc() {
          if (typeof window.credpixPath === 'function') {
            return window.credpixPath('/images/credpix-logo.png');
          }
          var base = window.credpixGetBasePath ? window.credpixGetBasePath() : (window.CREDPIX_BASE_PATH || '');
          return (base || '') + '/images/credpix-logo.png';
        }
        function applyLogo(container) {
          if (!container) return;
          var src = logoSrc();
          var img = container.querySelector('img[data-credpix-logo], img.credpix-logo-img');
          if (!img) {
            img = document.createElement('img');
            img.setAttribute('data-credpix-logo', '');
            img.className = 'credpix-logo-img credpix-logo-img--wizard';
            img.alt = 'CredPix';
            container.insertBefore(img, container.firstChild);
          }
          if (!img.getAttribute('src') || img.getAttribute('src') !== src) {
            img.setAttribute('src', src);
          }
          img.onerror = function () {
            if (img.getAttribute('src') !== FALLBACK_SRC) {
              img.setAttribute('src', FALLBACK_SRC);
            }
          };
          container.querySelectorAll('.logo-text, .logo-mark').forEach(function (el) {
            el.remove();
          });
        }
        function fixWizardLogo() {
          document.querySelectorAll('.brand-logo').forEach(applyLogo);
        }
        fixWizardLogo();
        new MutationObserver(fixWizardLogo).observe(document.documentElement, {
          childList: true,
          subtree: true,
          attributes: true,
          attributeFilter: ['src', 'class'],
        });
        var ticks = 0;
        var timer = setInterval(function () {
          fixWizardLogo();
          ticks += 1;
          if (ticks > 30) clearInterval(timer);
        }, 500);
      })();
    </script>

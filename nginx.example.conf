# Exemplo Nginx — aponte bulans.lat para o Node (porta 3000)
# Coloque em /etc/nginx/sites-available/bulans.lat e ative com ln -s

server {
    listen 80;
    listen [::]:80;
    server_name bulans.lat www.bulans.lat;

    # Redirecionar HTTP → HTTPS (ajuste se já tiver SSL no painel)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

